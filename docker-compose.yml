services:
  relay:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - relay-data:/data
    environment:
      DATABASE_URL: sqlite:///data/hb-relay.db
      BIND_ADDR: 0.0.0.0:3000
      MAX_COLLECTION_BYTES: "5242880"   # 5 MB; raise for large collections
      RUST_LOG: info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  relay-data:
